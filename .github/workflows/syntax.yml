name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  checkSyntax:
    name: Linting and Type Checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v7

      - name: Install UV and Python
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --locked

      - name: Ruff Check
        run: |
          uv run ruff --version
          uv run ruff check

      - name: Pyright Check
        run: |
          uv run pyright --version
          uv run pyright

      - name: Isort Check
        run: |
          uv run isort --version
          uv run isort --check .
